name: BetterMiniStructures Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Find JAR
        id: jar
        run: |
          JAR=$(find build/libs -name "*.jar" ! -name "*sources*" ! -name "*dev*" | head -n 1)
          echo "JAR=$JAR" >> $GITHUB_OUTPUT

      - name: Extract version from CHANGELOG
        id: vars
        run: |
          VERSION=$(grep -m1 '^## ' CHANGELOG.md | sed 's/^## //')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog section
        id: changelog
        run: |
          awk '
            BEGIN { printing = 0 }
            /^##[[:space:]]/ {
              if (printing == 1) exit
              printing = 1
              next
            }
            printing == 1 { print }
          ' CHANGELOG.md > changelog.txt

          sed -i 's/^\\//' changelog.txt

          cat changelog.txt

          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          cat changelog.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish Modrinth + CurseForge
        uses: Kir-Antipov/mc-publish@v3
        with:
          modrinth-id: hk6wLbCd
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: 1218290
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          files: ${{ steps.jar.outputs.JAR }}

          name: BetterMiniStructures ${{ steps.vars.outputs.VERSION }}
          version: ${{ steps.vars.outputs.VERSION }}

          changelog-file: changelog.txt

          loaders: |
            forge

          game-versions: |
            1.20.1

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.vars.outputs.VERSION }}
          name: BetterMiniStructures ${{ steps.vars.outputs.VERSION }}
          body: |
            ${{ steps.changelog.outputs.CHANGELOG }}
          files: ${{ steps.jar.outputs.JAR }}